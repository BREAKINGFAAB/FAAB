name: Auto V2Ray Tester

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # 👈 آپدیت شد به نسخه ۴ برای رفع اخطار

    - name: Set up Python
      uses: actions/setup-python@v5 # 👈 آپدیت شد به نسخه ۵ برای رفع اخطار
      with:
        python-version: '3.10'

    - name: Run Speed Test Script
      run: python main.py

    - name: Commit and Push Results
      run: |
        git config --global user.name "Github Action"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "Update top 20 configs" || exit 0
        git push || true
