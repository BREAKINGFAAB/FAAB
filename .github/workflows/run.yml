name: Auto V2Ray Tester

on:
  schedule:
    - cron: '0 */3 * * *' # اجرای دقیق سر هر ۳ ساعت
  workflow_dispatch: # دکمه اجرای دستی برای تست اولیه

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Run Speed Test Script
      run: python main.py

    - name: Commit and Push Results
      run: |
        git config --global user.name "Github Action"
        git config --global user.email "actions@github.com"
        git add best_configs.txt
        git commit -m "Update top 20 configs" || exit 0
        git push
